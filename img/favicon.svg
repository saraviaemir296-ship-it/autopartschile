<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="a">
      <!-- A shape with inner counter, evenodd -->
      <path clip-rule="evenodd" d="M16,2 L30,30 H23 L20,21 H12 L9,30 H2 Z M16,9 L13,21 H19 Z"/>
    </clipPath>
  </defs>
  <!-- White background -->
  <rect width="32" height="32" fill="white"/>
